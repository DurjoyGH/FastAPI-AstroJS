version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: chatbot-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: chatbot-backend
    ports:
      - "8000:8000"
    env_file:
      - ./app/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatbot-frontend
    ports:
      - "4321:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
